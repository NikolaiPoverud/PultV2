<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pult — Desk Booking</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-brand">
      <div class="logo-icon">P</div>
      <h1>Pult</h1>
    </div>
    <div class="header-user">
      <span id="user-info">Loading...</span>
    </div>
  </header>

  <main class="main">
    <section class="date-section">
      <div class="date-header">
        <label for="date-picker">Select date</label>
        <input type="date" id="date-picker">
        <span id="selected-date-display"></span>
      </div>
      <div class="quick-nav" id="quick-nav"></div>
    </section>

    <section class="map-section">
      <div class="map-header">
        <h2>Office Floor Plan</h2>
        <div class="map-legend">
          <div class="legend-item">
            <div class="legend-swatch available"></div>
            <span>Available</span>
          </div>
          <div class="legend-item">
            <div class="legend-swatch mine"></div>
            <span>My booking</span>
          </div>
          <div class="legend-item">
            <div class="legend-swatch other"></div>
            <span>Booked</span>
          </div>
        </div>
      </div>
      <div id="map-container">
        <p style="color: #999; text-align: center; padding: 40px;">Loading map...</p>
      </div>
    </section>
  </main>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
